    <title>MTGPros DJ</title>
    <!-- Spotify Web Playback SDK -->
    <script>
      // Must be defined BEFORE the SDK script loads, otherwise the SDK
      // throws "onSpotifyWebPlaybackSDKReady is not defined".
      window.__spotifySDKReady = false;
      window.onSpotifyWebPlaybackSDKReady = function () {
        window.__spotifySDKReady = true;
      };
    </script>
